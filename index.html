/* ─── STARS CANVAS ──────────────────────────────────────── */
function Stars() {
  useEffect(() => {
    const c = document.getElementById('stars');
    const ctx = c.getContext('2d');
    let W = c.width = window.innerWidth, H = c.height = window.innerHeight;
    const stars = Array.from({ length: 200 }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.2 + .2,
      a: Math.random(), s: Math.random() * .003 + .001
    }));
    let raf;
    const draw = () => {
      ctx.clearRect(0, 0, W, H);
      stars.forEach(s => {
        s.a += s.s;
        if (s.a > 1 || s.a < 0) s.s *= -1;
        ctx.globalAlpha = s.a * .6;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
      });
      raf = requestAnimationFrame(draw);
    };
    draw();
    const resize = () => { W = c.width = window.innerWidth; H = c.height = window.innerHeight; };
    window.addEventListener('resize', resize);
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);
  return null;
}

/* ─── CURSOR ────────────────────────────────────────────── */
function Cursor() {
  useEffect(() => {
    const c = document.getElementById('cur'), t = document.getElementById('cur2');
    if (!c || !t) return;
    let mx = 0, my = 0, tx = 0, ty = 0;
    const m = e => { mx = e.clientX; my = e.clientY; c.style.transform = `translate(${mx - 4}px,${my - 4}px)`; };
    const a = () => { tx += (mx - tx) * .1; ty += (my - ty) * .1; t.style.transform = `translate(${tx - 14}px,${ty - 14}px)`; requestAnimationFrame(a); };
    document.addEventListener('mousemove', m); a();
    return () => document.removeEventListener('mousemove', m);
  }, []);
  return null;
}

/* ─── SCROLL BAR ────────────────────────────────────────── */
function ScrollBar() {
  const [p, setP] = useState(0);
  useEffect(() => {
    const f = () => setP(Math.min(100, (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100));
    window.addEventListener('scroll', f);
    return () => window.removeEventListener('scroll', f);
  }, []);
  return <div style={{ position: 'fixed', top: 0, left: 0, height: '2px', width: p + '%', background: 'linear-gradient(90deg,var(--v),var(--cyan2))', zIndex: 200 }} />;
}

/* ─── GLASS CARD ────────────────────────────────────────── */
function GlassCard({ children, style = {}, hov = true }) {
  const [h, setH] = useState(false);
  return (
    <div

      onMouseLeave={() => hov && setH(false)}
      style={{

        borderRadius: '16px', backdropFilter: 'blur(12px)',
        transition: 'all .3s ease',
        transform: h ? 'translateY(-4px)' : 'none',

      }}>
      {children}
    </div>
  );
}

              {e.bullets.map((b, j) => (
                <div key={j} style={{ display: 'flex', gap: '.75rem', padding: '.85rem 1rem', background: 'rgba(255,255,255,0.02)', borderRadius: '8px', border: '1px solid var(--glass-border)' }}>
                  <div style={{ width: '6px', height: '6px', borderRadius: '50%', background: 'var(--v2)', flexShrink: 0, marginTop: '.35rem' }} />

                </div>
              ))}
            </div>
          </GlassCard>
        ))}
      </div>
    </section>
  );
}

/* ─── CONTACT ───────────────────────────────────────────── */

      </div>

/* ─── APP ───────────────────────────────────────────────── */
function App() {
  const [active, setActive] = useState('');
  useEffect(() => {
    const secs = ['about', 'skills', 'experience', 'projects', 'contact'];
    const fn = () => {
      const y = window.scrollY + 130;
      for (const id of secs) {
        const el = document.getElementById(id);
        if (el && y >= el.offsetTop && y < el.offsetTop + el.offsetHeight) { setActive(id); return; }
      }
      setActive('');
    };
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  return (
    <>
      <Stars />
      <Cursor />
      <ScrollBar />
      <Nav active={active} />
      <Hero />
      <About />
      <Skills />
      <Experience />
      <Projects />
      <Contact />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
